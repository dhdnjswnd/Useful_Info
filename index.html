<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>출산 지원 타임라인 생성기</title>
  <meta name="description" content="출산 예정일, 거주 지역, 혼인신고 여부를 선택하면 신청 타임라인과 주요 지원 내용을 자동으로 정리해주는 페이지입니다.">
  <meta name="theme-color" content="#c45f3e">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://dhdnjswnd.github.io/Useful_Info/">

  <meta property="og:type" content="website">
  <meta property="og:locale" content="ko_KR">
  <meta property="og:site_name" content="Useful_Info">
  <meta property="og:title" content="출산 지원 타임라인 생성기">
  <meta property="og:description" content="예정일, 거주 지역, 혼인신고 여부를 고르면 출산 지원 일정과 신청 주체를 자동으로 정리합니다.">
  <meta property="og:url" content="https://dhdnjswnd.github.io/Useful_Info/">
  <meta property="og:image" content="https://dhdnjswnd.github.io/Useful_Info/og-image.svg">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="출산 지원 타임라인 생성기">
  <meta name="twitter:description" content="예정일, 거주 지역, 혼인신고 여부로 자동 생성되는 출산 지원 타임라인">
  <meta name="twitter:image" content="https://dhdnjswnd.github.io/Useful_Info/og-image.svg">

  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">Useful Info</p>
      <h1>출산 지원 타임라인 생성기</h1>
      <p class="intro">출산 예정일, 거주 지역, 혼인신고 여부를 선택하면 신청 시점, 신청 주체, 마감일, 주요 지원 내용을 한 번에 정리합니다. 현재는 `화성시`, `수원시`, `성남시`, `용인시`, `서울특별시`를 반영한 버전입니다.</p>
    </section>

    <section class="layout">
      <form id="generator-form" class="panel form-panel">
        <h2>조건 선택</h2>

        <label>
          <span>출산 예정일</span>
          <input type="date" id="dueDate" required value="2026-06-23">
        </label>

        <label>
          <span>거주 지역</span>
          <select id="city" required>
            <option value="hwaseong">화성시</option>
            <option value="suwon">수원시</option>
            <option value="seongnam">성남시</option>
            <option value="yongin">용인시</option>
            <option value="seoul">서울특별시</option>
          </select>
        </label>

        <label>
          <span>혼인신고 여부</span>
          <select id="maritalStatus" required>
            <option value="not_registered">혼인신고 안 함</option>
            <option value="registered">혼인신고 완료</option>
          </select>
        </label>

        <label>
          <span>출생 순서</span>
          <select id="birthOrder" required>
            <option value="1">첫째</option>
            <option value="2">둘째</option>
            <option value="3">셋째</option>
            <option value="4">넷째 이상</option>
          </select>
        </label>

        <label>
          <span>거주요건 충족 여부</span>
          <select id="residencyMet" required>
            <option value="yes">충족함</option>
            <option value="no">아직 미충족</option>
          </select>
        </label>

        <label>
          <span>주 신청 담당 예정</span>
          <select id="primaryApplicant" required>
            <option value="mother">엄마 중심</option>
            <option value="father">아빠 중심</option>
            <option value="both">둘이 같이</option>
          </select>
        </label>

        <label>
          <span>추가 메모</span>
          <textarea id="notes" rows="4" placeholder="예: 화성시 180일 거주요건 이미 충족, 출생신고는 엄마가 할 예정"></textarea>
        </label>

        <button type="submit">타임라인 생성</button>
      </form>

      <section class="panel result-panel">
        <div id="result"></div>
      </section>
    </section>
  </main>

  <template id="result-template">
    <section class="result-root">
      <header class="result-hero">
        <div>
          <p class="eyebrow">Generated Timeline</p>
          <h2 class="result-title"></h2>
          <p class="result-subtitle"></p>
        </div>
        <div class="chips"></div>
      </header>

      <section class="summary-grid"></section>

      <section class="panel-block">
        <h3>시점별 행동표</h3>
        <div class="timeline-list"></div>
      </section>

      <section class="panel-block">
        <h3>지원별 상세</h3>
        <div class="support-list"></div>
      </section>

      <section class="panel-block">
        <h3>실무 메모</h3>
        <div class="notes-box"></div>
      </section>
    </section>
  </template>

  <script src="./app.js"></script>
</body>
</html>
